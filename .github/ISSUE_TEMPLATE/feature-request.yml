name: ✨ Feature Request
description: 提一个新功能或改进建议
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量填写完整，方便我们评估优先级。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 这个功能要解决什么实际场景下的痛点？
      placeholder: 例如：希望能够批量发布到 5 个平台，目前只能逐个发布
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望系统怎么做？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过哪些其他方案？为什么选择当前方案？

  - type: dropdown
    id: module
    attributes:
      label: 期望落地的模块
      options:
        - 微信小程序
        - FastAPI 后端
        - React 前端
        - 热点采集
        - AI 内容生成
        - 多平台发布
        - 媒体下载
        - CLI 工具
        - 部署/Docker
        - 文档/示例
        - 其他

  - type: dropdown
    id: priority
    attributes:
      label: 重要程度
      options:
        - "🚀 高 - 阻塞核心场景"
        - "⭐ 中 - 显著提升体验"
        - "💡 低 - 锦上添花"

  - type: textarea
    id: context
    attributes:
      label: 补充上下文
      description: 截图、链接、已知的类似实现等

  - type: checkboxes
    id: terms
    attributes:
      label: 提交确认
      options:
        - label: 我已搜索过现有 Issue 与路线图，确认这是新建议
          required: true
